  stageJumpButtons.forEach((btn, idx) => {
    btn.classList.toggle('active', idx === step);
    btn.disabled = animDir !== 0 || autoplay;
  });
}

function beginStepAnimation(dir) {
  if (animDir !== 0) return;
  if (dir > 0 && step >= STEPS.length - 1) return;
  if (dir < 0 && step <= 0) return;
  // Re-parent P5s to dodGroup before the slide so they don't move with idoGroup
  if (dir > 0 && step === 4) idoPyramids.forEach(({ mesh }) => { if (mesh.parent === idoGroup) dodGroup.attach(mesh); });
  animT = 0;
  animDir = dir;
}

btnNext.addEventListener('click', () => {
  if (autoplay) return;
  beginStepAnimation(1);
});
btnBack.addEventListener('click', () => {
  if (autoplay) return;
  beginStepAnimation(-1);
});
btnPlayAll.addEventListener('click', () => {
  if (autoplay) {
    autoplay = false;
    return;
  }
  step = 0;
  animT = 0;
  animDir = 0;
  autoplay = true;
  onStepChange(step);
  refreshStageMenu();
});
btnToggleDebug.addEventListener('click', () => {
  debugPanelVisible = !debugPanelVisible;
  stageMenuEl.classList.toggle('hidden', !debugPanelVisible);
  btnToggleDebug.textContent = debugPanelVisible ? 'Hide Debug Panel' : 'Show Debug Panel';
});

function setHexDissectionState(stageIdx, t) {
  hexDissectionPackages.forEach(({ group, stages, assemblyStage, assembledBlockOrigin, setStage0T, setStage1T, setStage3T, setStage5T, setStage6T, setStage7T }, idx) => {
    const offset = prolateRhombs[idx].explodeDir.clone().multiplyScalar(HEX_EXPLODE_DIST);
    if (stageIdx === 8) {
      const slot = hexMacroSlots[idx];
      const target = [
        hexMacroOrigin[0] + slot[0] * hexMacroUnitDims[0] - assembledBlockOrigin[0],
        hexMacroOrigin[1] + slot[1] * hexMacroUnitDims[1] - assembledBlockOrigin[1],
        hexMacroOrigin[2] + slot[2] * hexMacroUnitDims[2] - assembledBlockOrigin[2],
      ];
      group.position.set(
        THREE.MathUtils.lerp(offset.x, target[0], t),
        THREE.MathUtils.lerp(offset.y, target[1], t),
        THREE.MathUtils.lerp(offset.z, target[2], t),
      );
    } else {
      group.position.copy(offset);
    }
    group.visible = true;
    stages.forEach((stage, i) => { stage.visible = i === stageIdx; });
    assemblyStage.visible = stageIdx >= 6;
    setStage0T(stageIdx > 0 ? 1 : t);
    setStage1T(stageIdx === 1 ? t : stageIdx > 1 ? 1 : 0);
    setStage3T(stageIdx === 3 ? t : stageIdx > 3 ? 1 : 0);
    setStage5T(stageIdx === 5 ? t : stageIdx > 5 ? 1 : 0);
    setStage6T(stageIdx === 6 ? t : stageIdx > 6 ? 1 : 0);
    if (stageIdx === 7) setStage7T(t);
    else if (stageIdx > 7) setStage7T(1);
  });
}

function getRTPackedPose(pkg, idx, macroOrigin, macroUnitDims, macroSlots) {
  const sourceBlockQuat = basisQuaternion(pkg.assembledBlockFrame);
  const targetBlockQuat = rtDissectionGroup.quaternion.clone().invert()
    .multiply(hexDissectionGroup.quaternion)
    .multiply(hexAssembledBlockQuat);
  const basisCorrection = targetBlockQuat.clone().multiply(sourceBlockQuat.invert());
  const macroBasis = quaternionToBasis(targetBlockQuat);
  const anchorPointLocal = new THREE.Vector3(...pkg.assembledBlockAnchorPointLocal);
  const slot = macroSlots[idx];
  const targetAnchor = new THREE.Vector3(...macroOrigin)
    .add(new THREE.Vector3(...macroBasis.u).multiplyScalar(slot[0] * macroUnitDims[0]))
    .add(new THREE.Vector3(...macroBasis.v).multiplyScalar(slot[1] * macroUnitDims[1]))
    .add(new THREE.Vector3(...macroBasis.w).multiplyScalar(slot[2] * macroUnitDims[2]));
  const rotatedAnchorOffset = anchorPointLocal.clone().applyQuaternion(basisCorrection);
  return {
    position: targetAnchor.sub(rotatedAnchorOffset),
    quaternion: basisCorrection,
  };
}

function getRTProlateStackOrigin() {
  const topAnchorWorld = hexDissectionGroup.localToWorld(
    new THREE.Vector3(
      hexMacroOrigin[0],
      hexMacroOrigin[1],
      hexMacroOrigin[2] + 2 * hexMacroUnitDims[2]
    )
  );
  return rtDissectionGroup.worldToLocal(topAnchorWorld).toArray();
}

function setRTFamilyDissectionState(packages, rhombos, stageIdx, t, macroOrigin = null, macroUnitDims = null, macroSlots = null) {
  packages.forEach(({ group, stages, assemblyStage, assembledBlockCenter, assembledBlockAnchorPointLocal, assembledBlockFrame, setStage0T, setStage1T, setStage3T, setStage5T, setStage6T, setStage7T }, idx) => {
    const sourceBlockQuat = basisQuaternion(assembledBlockFrame);
    const basisCorrection = rtDissectionGroup.quaternion.clone().invert()
      .multiply(hexDissectionGroup.quaternion)
      .multiply(hexAssembledBlockQuat)
      .multiply(sourceBlockQuat.invert());
    const center = new THREE.Vector3(...assembledBlockCenter);
    if (stageIdx === 8 || stageIdx === 9 || stageIdx === 10) {
      const rhomboPos = rhombos[idx].mesh.position.clone();
      if (stageIdx === 8) {
        const currentQuat = new THREE.Quaternion().slerpQuaternions(_q0, basisCorrection, t);
        const rotatedCenter = center.clone().applyQuaternion(currentQuat);
        group.position.copy(rhomboPos).add(center).sub(rotatedCenter);
        group.quaternion.copy(currentQuat);
      } else if (stageIdx === 9) {
        const rotatedCenter = center.clone().applyQuaternion(basisCorrection);
        const sourcePos = rhomboPos.clone().add(center).sub(rotatedCenter);
        const packedPose = getRTPackedPose({
          assembledBlockFrame,
          assembledBlockAnchorPointLocal,
        }, idx, macroOrigin, macroUnitDims, macroSlots);
        group.position.lerpVectors(sourcePos, packedPose.position, t);
        group.quaternion.copy(packedPose.quaternion);
      } else {
        const fromPose = getRTPackedPose({
          assembledBlockFrame,
          assembledBlockAnchorPointLocal,
        }, idx, macroOrigin, macroUnitDims, macroSlots);
        const toPose = getRTPackedPose({
          assembledBlockFrame,
          assembledBlockAnchorPointLocal,
        }, idx, getRTProlateStackOrigin(), macroUnitDims, macroSlots);
        group.position.lerpVectors(fromPose.position, toPose.position, t);
        group.quaternion.copy(fromPose.quaternion);
      }
    } else {
      group.position.copy(rhombos[idx].mesh.position);
      group.quaternion.identity();
    }
    group.visible = true;
    stages.forEach((stage, i) => { stage.visible = i === stageIdx; });
    assemblyStage.visible = stageIdx >= 6;
    setStage0T(stageIdx > 0 ? 1 : t);
    setStage1T(stageIdx === 1 ? t : stageIdx > 1 ? 1 : 0);
    setStage3T(stageIdx === 3 ? t : stageIdx > 3 ? 1 : 0);
    setStage5T(stageIdx === 5 ? t : stageIdx > 5 ? 1 : 0);
    setStage6T(stageIdx === 6 ? t : stageIdx > 6 ? 1 : 0);
    if (stageIdx === 7) setStage7T(t);
    else if (stageIdx > 7) setStage7T(1);
  });
}

function buildBoxCornersLocal(origin, basis0, basis1, basis2, dims) {
  const o = new THREE.Vector3(...origin);
  const b0 = new THREE.Vector3(...basis0);
  const b1 = new THREE.Vector3(...basis1);
  const b2 = new THREE.Vector3(...basis2);
  const corners = [];
  for (const i of [0, 1]) {
    for (const j of [0, 1]) {
      for (const k of [0, 1]) {
        corners.push(
          o.clone()
            .addScaledVector(b0, i * dims[0])
            .addScaledVector(b1, j * dims[1])
            .addScaledVector(b2, k * dims[2])
        );
      }
    }
  }
  return corners;
}

function averageWorldPoints(points) {
  const sum = new THREE.Vector3();
  points.forEach(p => sum.add(p));
  return sum.multiplyScalar(1 / points.length);
}

function worldExtentAlong(points, axis) {
  let min = Infinity;
  let max = -Infinity;
  points.forEach(point => {
    const d = axis.dot(point);
    min = Math.min(min, d);
    max = Math.max(max, d);
  });
  return max - min;
}

function worldDeltaToParentLocal(object, deltaWorld) {
  if (!object.parent) return deltaWorld.clone();
  const parentQuat = new THREE.Quaternion();
  object.parent.getWorldQuaternion(parentQuat);
  return deltaWorld.clone().applyQuaternion(parentQuat.invert());
}

function getLateStageSlotLayout() {
  const layout = getRTMacroLayout();
  const worldXAxis = new THREE.Vector3(1, 0, 0);

  const hexCornersWorld = buildBoxCornersLocal(
    [hexMacroOrigin[0], hexMacroOrigin[1], hexMacroOrigin[2]],
    [1, 0, 0], [0, 1, 0], [0, 0, 1],
    [5 * hexMacroUnitDims[0], 2 * hexMacroUnitDims[1], 2 * hexMacroUnitDims[2]]
  ).map(point => hexDissectionGroup.localToWorld(point));
  const prolateCornersWorld = buildBoxCornersLocal(
    layout.prolateOrigin,
    layout.basis.u, layout.basis.v, layout.basis.w,
    rtProlateMacroDims
  ).map(point => rtDissectionGroup.localToWorld(point));
  const oblateCornersWorld = buildBoxCornersLocal(
    layout.oblateOrigin,
    layout.basis.u, layout.basis.v, layout.basis.w,
    rtOblateMacroDims
  ).map(point => rtDissectionGroup.localToWorld(point));

  const hexCenterWorld = averageWorldPoints(hexCornersWorld);
  const prolateCenterWorld = averageWorldPoints(prolateCornersWorld);
  const oblateCenterWorld = averageWorldPoints(oblateCornersWorld);
  const hexWidth = worldExtentAlong(hexCornersWorld, worldXAxis);
  const prolateWidth = worldExtentAlong(prolateCornersWorld, worldXAxis);
  const oblateWidth = worldExtentAlong(oblateCornersWorld, worldXAxis);

  const prolateTargetWorld = prolateCenterWorld.clone();
  prolateTargetWorld.x = 0;
  const centerSpacing = Math.max(
    0.5 * (hexWidth + prolateWidth),
    0.5 * (prolateWidth + oblateWidth)
  ) + 0.4;
  const hexTargetWorld = hexCenterWorld.clone();
  const oblateTargetWorld = oblateCenterWorld.clone();
  oblateTargetWorld.x = centerSpacing;

  const hexDeltaWorld = hexTargetWorld.sub(hexCenterWorld);
  const prolateDeltaWorld = prolateTargetWorld.sub(prolateCenterWorld);
  const oblateDeltaWorld = oblateTargetWorld.sub(oblateCenterWorld);

  return {
    hexCenterWorld,
    prolateCenterWorld,
    oblateCenterWorld,
    hexPresentedCenterWorld: hexCenterWorld.clone().add(hexDeltaWorld),
    prolatePresentedCenterWorld: prolateCenterWorld.clone().add(prolateDeltaWorld),
    oblatePresentedCenterWorld: oblateCenterWorld.clone().add(oblateDeltaWorld),
    leftDeltaWorld: hexDeltaWorld,
    centerDeltaWorld: prolateDeltaWorld,
    rightDeltaWorld: oblateDeltaWorld,
    hexDeltaWorld,
    prolateDeltaWorld,
    oblateDeltaWorld,
  };
}

function _applyIcoPyramids(from, t) {
  if (from === 0) {
    pyramids.forEach(({ mesh, explodeDir }) => {
      mesh.position.copy(explodeDir).multiplyScalar(t * EXPLODE_DIST);
      mesh.quaternion.identity();
    });
  } else if (from === 1) {
    pyramids.forEach(({ mesh, explodeDir }, k) => {
      const { apexLocal, targetQuat } = pyramidTargets[k];
      mesh.position.lerpVectors(explodeDir.clone().multiplyScalar(EXPLODE_DIST), apexLocal, t);
      mesh.quaternion.slerpQuaternions(_q0, targetQuat, t);
    });
  } else {
    pyramids.forEach(({ mesh }, k) => {
      mesh.position.copy(pyramidTargets[k].apexLocal);
      mesh.quaternion.copy(pyramidTargets[k].targetQuat);
    });
  }
}

function _applyP5Pyramids(from, t) {
  const p5Active = from >= 2;
  idoPyramids.forEach(({ mesh }) => { mesh.visible = p5Active; });
  idoPentSolid.visible = !p5Active;
  cavityWalls.forEach(m => { m.visible = p5Active && from < 5; });

  if (from === 2) {
    idoPyramids.forEach(({ mesh, explodeDir }) => {
      mesh.position.copy(explodeDir).multiplyScalar(t * EXPLODE_DIST);
      mesh.quaternion.identity();
    });
  } else if (from === 3) {
    idoPyramids.forEach(({ mesh, explodeDir }, k) => {
      const { targetPos, targetQuat } = p5Targets[k];
      mesh.position.lerpVectors(explodeDir.clone().multiplyScalar(EXPLODE_DIST), targetPos, t);
      mesh.quaternion.slerpQuaternions(_q0, targetQuat, t);
    });
  } else if (from >= 4) {
    idoPyramids.forEach(({ mesh }, k) => {
      if (mesh.parent !== idoGroup) return;
      mesh.position.copy(p5Targets[k].targetPos);
      mesh.quaternion.copy(p5Targets[k].targetQuat);
    });
  }
}

function _applyHexSection(from, t) {
  const hexExploded  = from >= 6;
  const hexExploding = from === 5 && t > 0;
  icoGroup.visible    = !hexExploded && !hexExploding;
  idoTriSolid.visible = !hexExploded && !hexExploding;
  prolateRhombs.forEach(({ mesh, explodeDir }) => {
    mesh.visible = from >= 5;
    mesh.position.copy(explodeDir).multiplyScalar(
      hexExploded ? HEX_EXPLODE_DIST : hexExploding ? t * HEX_EXPLODE_DIST : 0
    );
  });
  hexDissectionGroup.visible = from >= 6;

  const HEX_DISPATCH = {
    lt6:  () => { hexDissectionPackages.forEach(({ group, stages }) => { group.visible = false; stages.forEach(s => { s.visible = false; }); }); },
    6:    () => setHexDissectionState(0, t),
    7:    () => setHexDissectionState(1, t),
    8:    () => setHexDissectionState(3, t),
    9:    () => setHexDissectionState(5, t),
    10:   () => t > 1e-6 ? setHexDissectionState(6, t) : setHexDissectionState(5, 1),
    11:   () => t > 1e-6 ? setHexDissectionState(7, t) : setHexDissectionState(6, 1),
    12:   () => t > 1e-6 ? setHexDissectionState(8, t) : setHexDissectionState(7, 1),
    gte13: () => setHexDissectionState(8, 1),
  };
  const hexKey = from < 6 ? 'lt6' : from <= 12 ? String(from) : 'gte13';
  (HEX_DISPATCH[hexKey] || HEX_DISPATCH.gte13)();

  prolateRhombs.forEach(({ mesh }) => {
    const opacity = from < 6 ? 1 : from === 6 ? 1 - t : 0;
    mesh.material.opacity = opacity;
    mesh.visible = from >= 5 && opacity > 1e-4;
  });
  hexRectGroup.visible = false;
}

    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);

  },
  21: (t, ctx) => {
    setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 7, 1);
    setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 1, t);
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
  22: (t, ctx) => {
    setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 7, 1);
    setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 3, t);
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
  23: (t, ctx) => {
    setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 7, 1);
    setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 5, t);
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
  24: (t, ctx) => {
    setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 7, 1);
    if (t > 1e-6) setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 6, t);
    else setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 5, 1);
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
  25: (t, ctx) => {
    setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 7, 1);
    if (t > 1e-6) setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 7, t);
    else setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 6, 1);
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },

    if (t > 1e-6) {
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 8, t);
      setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 8, t);
    } else {
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 7, 1);
      setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 7, 1);
    }
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
  27: (t, ctx) => {
    const rtMacroLayout = getRTMacroLayout();
    if (t > 1e-6) {
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 9, t, rtMacroLayout.prolateOrigin, rtProlateMacroUnitDims, rtFamilyMacroSlots);
      setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 9, t, rtMacroLayout.oblateOrigin, rtOblateMacroUnitDims, rtFamilyMacroSlots);
    } else {
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 8, 1);
      setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 8, 1);
    }
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
  28: (t, ctx) => {
    const rtMacroLayout = getRTMacroLayout();
    if (t > 1e-6) {
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 10, t, rtMacroLayout.prolateOrigin, rtProlateMacroUnitDims, rtFamilyMacroSlots);
    } else {
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 9, 1, rtMacroLayout.prolateOrigin, rtProlateMacroUnitDims, rtFamilyMacroSlots);
    }
    setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 9, 1, rtMacroLayout.oblateOrigin, rtOblateMacroUnitDims, rtFamilyMacroSlots);
    ctx._setRhombFamilyOpacity(rtProlateRhombs, 0);
    ctx._setRhombFamilyOpacity(rtOblateRhombs, 0);
  },
};

function applyVisuals(from, t) {
  // Shared setup: reset late-stage comb groups to base positions
  combStep1A.group.visible = false;
  combStep1B.group.visible = false;
  combStep3A.group.visible = false;
  combStep3B.group.visible = false;
  combStep1A.group.position.copy(combStep1A.group.userData.basePosition);
  combStep1B.group.position.copy(combStep1B.group.userData.basePosition);
  combStep3A.group.position.copy(combStep3A.group.userData.basePosition);
  combStep3B.group.position.copy(combStep3B.group.userData.basePosition);
  const lateSlotLayout = getLateStageSlotLayout();
  const leftDeltaComb1A = worldDeltaToParentLocal(combStep1A.group, lateSlotLayout.leftDeltaWorld);
  const leftDeltaComb1B = worldDeltaToParentLocal(combStep1B.group, lateSlotLayout.leftDeltaWorld);
  const leftDeltaComb3A = worldDeltaToParentLocal(combStep3A.group, lateSlotLayout.leftDeltaWorld);
  const leftDeltaComb3B = worldDeltaToParentLocal(combStep3B.group, lateSlotLayout.leftDeltaWorld);
  const hexLeftDeltaLocal = worldDeltaToParentLocal(hexDissectionGroup, lateSlotLayout.leftDeltaWorld);
  const rtProlateLeftDeltaLocal = worldDeltaToParentLocal(rtProlateDissectionPackages[0].group, lateSlotLayout.leftDeltaWorld);
  const rtProlateCenterDeltaLocal = worldDeltaToParentLocal(rtProlateDissectionPackages[0].group, lateSlotLayout.centerDeltaWorld);
  const rtOblateRightDeltaLocal = worldDeltaToParentLocal(rtOblateDissectionPackages[0].group, lateSlotLayout.rightDeltaWorld);

  // --- Ico pyramids (steps 0→1: explode, 1→2: transfer, 2+: settled) ---
  _applyIcoPyramids(from, t);

  // --- P5 pyramids (visible from step 2 onward) ---
  _applyP5Pyramids(from, t);

  // --- Stage slide (step 4→5) ---
  const st = from < 4 ? 0 : from === 4 ? t : 1;
  icoGroup.position.x        = THREE.MathUtils.lerp(-SPACING,  -2*SPACING, st);
  idoGroup.position.x        = THREE.MathUtils.lerp(0,         -SPACING,   st);
  hexRhomboGroup.position.x  = THREE.MathUtils.lerp(0,         -SPACING,   st);
  hexDissectionGroup.position.x = hexRhomboGroup.position.x;
  hexRectGroup.position.x    = hexRhomboGroup.position.x;
  rtRectGroup.position.x     = rtRhomboGroup.position.x;
  rtShell.visible  = from >= 5;
  dodGroup.visible = from <= 4;

  // --- Hex rhombohedra (steps 5–12) ---
  _applyHexSection(from, t);

  // --- RT rhombohedra / dissections (steps 13–28) ---
  const rtExploded  = from >= 14;
  const rtExploding = from === 13 && t > 0;
  if (from >= 5) rtShell.visible = !rtExploded && !rtExploding;
  zonoRhombs.forEach(({ mesh, explodeDir }) => {
    mesh.visible = rtExploded || rtExploding;
    mesh.position.copy(explodeDir).multiplyScalar(
      rtExploded ? RT_EXPLODE_DIST : rtExploding ? t * RT_EXPLODE_DIST : 0
    );
    mesh.material.opacity = 1;
  });
  rtRectGroup.visible = false;
  rtDissectionGroup.visible = from >= 14;
  if (from < 14) {
    [...rtProlateDissectionPackages, ...rtOblateDissectionPackages].forEach(({ group, stages, assemblyStage }) => {
      group.visible = false;
      stages.forEach(stage => { stage.visible = false; });
      assemblyStage.visible = false;
    });
  } else {
    const rtCtx = {
      rtOblateRightDeltaLocal,
      _hidePackages: pkgs => pkgs.forEach(({ group }) => { group.visible = false; }),
      _setRhombFamilyOpacity: (family, opacity) => {
        family.forEach(({ mesh }) => {
          mesh.material.opacity = opacity;
          mesh.visible = opacity > 1e-4;
        });
      },
    };
    if (RT_STAGE_HANDLERS[from]) {
      RT_STAGE_HANDLERS[from](t, rtCtx);
    } else {
      // from >= 29: RT fully assembled
      const rtMacroLayout = getRTMacroLayout();
      setRTFamilyDissectionState(rtProlateDissectionPackages, rtProlateRhombs, 10, 1, rtMacroLayout.prolateOrigin, rtProlateMacroUnitDims, rtFamilyMacroSlots);
      setRTFamilyDissectionState(rtOblateDissectionPackages, rtOblateRhombs, 9, 1, rtMacroLayout.oblateOrigin, rtOblateMacroUnitDims, rtFamilyMacroSlots);
      rtCtx._setRhombFamilyOpacity(rtProlateRhombs, 0);
      rtCtx._setRhombFamilyOpacity(rtOblateRhombs, 0);
    }
  }

  // --- Late stage (steps 29–34) ---
  const step1AActive = from >= 29;
  const step1BActive = from >= 30;
  if (step1AActive) {
    combStep1A.setT(from > 29 ? 1 : t);
    hexDissectionGroup.visible = false;
    rtProlateDissectionPackages.forEach(({ group }) => { group.visible = false; });
  }
  if (step1BActive) {
    combStep1B.setT(from > 30 ? 1 : t);
    hexDissectionGroup.visible = false;
    rtProlateDissectionPackages.forEach(({ group }) => { group.visible = false; });
    combStep1A.group.visible = false;
  }
  if (from >= 31) {
    const step2Pose = getRTOblateStep2Pose();
    const translateT = from === 31 ? t : from > 31 ? 1 : 0;
    rtOblateDissectionPackages.forEach((pkg, idx) => {
      const basePose = getRTPackedPose({
        assembledBlockFrame: pkg.assembledBlockFrame,
        assembledBlockAnchorPointLocal: pkg.assembledBlockAnchorPointLocal,
      }, idx, step2Pose.layout.oblateOrigin, rtOblateMacroUnitDims, rtFamilyMacroSlots);
      pkg.group.position.copy(basePose.position)
        .add(rtOblateRightDeltaLocal)
        .addScaledVector(step2Pose.translateDelta, translateT);
      pkg.group.quaternion.copy(basePose.quaternion);
    });
  }
  const step3AActive = (from === 32 && t > 1e-6) || from === 33;
  const step3BActive = (from === 33 && t > 1e-6) || from > 33;
  if (step3AActive) {
    combStep3A.setT(from > 32 ? 1 : t);
    combStep1B.group.visible = false;
    rtOblateDissectionPackages.forEach(({ group }) => { group.visible = false; });
  }
  if (step3BActive) {
    combStep3B.setT(from > 33 ? 1 : t);
    combStep3A.group.visible = false;
    combStep1B.group.visible = false;
    rtOblateDissectionPackages.forEach(({ group }) => { group.visible = false; });
  }

  // --- Position adjustments (steps 27–29) ---
  if (from === 27) {
    hexDissectionGroup.position.addScaledVector(hexLeftDeltaLocal, t);
    rtProlateDissectionPackages.forEach(({ group }) => {
      group.position.addScaledVector(rtProlateCenterDeltaLocal, t);
    });
    rtOblateDissectionPackages.forEach(({ group }) => {
      group.position.addScaledVector(rtOblateRightDeltaLocal, t);
    });
  } else if (from === 28) {
    hexDissectionGroup.position.add(hexLeftDeltaLocal);
    rtProlateDissectionPackages.forEach(({ group }) => {
      group.position.add(rtProlateCenterDeltaLocal.clone().lerp(rtProlateLeftDeltaLocal, t));
    });
    rtOblateDissectionPackages.forEach(({ group }) => {
      group.position.add(rtOblateRightDeltaLocal);
    });
  }

  if (from >= 29) {
    combStep1A.group.position.add(leftDeltaComb1A);
    combStep1B.group.position.add(leftDeltaComb1B);
    combStep3A.group.position.add(leftDeltaComb3A);
    combStep3B.group.position.add(leftDeltaComb3B);
  }
  if (from === 29 || from === 30) {
    rtOblateDissectionPackages.forEach(({ group }) => {
      group.position.add(rtOblateRightDeltaLocal);
    });
  }
}

function onStepChange(s) {
  // Re-parent P5 pyramids
  if (s >= 5) {
    idoPyramids.forEach(({ mesh }) => { if (mesh.parent === idoGroup) dodGroup.attach(mesh); });
  } else {
    idoPyramids.forEach(({ mesh }) => { if (mesh.parent === dodGroup) idoGroup.attach(mesh); });
  }

  // Label updates
  labelEls[0].style.display = s < 5 ? '' : 'none';
  const usePrismLabels = s >= 28;
  labelEls[1].style.display = usePrismLabels ? 'none' : '';
  labelEls[2].style.display = usePrismLabels ? 'none' : '';
  if (s >= 5) {
    const hexRole = s >= 13
      ? s >= 34
        ? '= contributes to final cube'
        : s >= 33
          ? '= contributes to Step 3A block B₂'
        : s >= 32
          ? '= contributes to final Step 2 block'
        : s >= 31
          ? '= contributes to Step 1 prism P₁′'
        : s >= 30
          ? '= contributes to Step 1A prism P₁'
        : '= 1 large 2×2×5 prism'
      : s === 12
        ? '= 20 local 1×2×3 prism blocks'
        : s === 11
          ? '= 120 axis-aligned rectangular prisms'
          : s === 10
            ? '= 120 rectangular prisms'
            : s === 9
        ? '= 120 parallelogram prisms'
        : s === 8
          ? '= 120 triangular prisms'
          : s === 7
            ? '= 120 Hill tetrahedra'
            : '= 20 prolate rhombohedra';
    const rtRole = s >= 26
      ? s === 26
        ? '= 20 local 1×2×3 prism blocks'
        : s === 27
          ? '= 20 rotated local 1×2×3 prism blocks'
          : s === 28
            ? '= 2 separate 1×2×5 prisms'
            : s === 29
              ? '= stacked hex + RT prolate prisms, plus 1 oblate 1×2×5 prism'
              : s === 30
                ? '= Step 1A prism B₁, plus 1 oblate 1×2×5 prism'
                : s === 31
                  ? '= Step 1 prism P₁′, plus 1 oblate 1×2×5 prism'
                  : s === 32
                    ? '= final Step 2 block'
                    : s === 33
                      ? '= Step 3A block B₂'
                      : '= cube'
      : s === 25
        ? '= 10 local prolate blocks + 60 axis-aligned oblate prisms'
        : s === 24
          ? '= 10 local prolate blocks + 60 oblate rectangular prisms'
          : s === 23
            ? '= 10 local prolate blocks + 60 oblate parallelogram prisms'
            : s === 22
              ? '= 10 local prolate blocks + 60 oblate triangular prisms'
              : s === 21
                ? '= 10 local prolate blocks + 60 oblate Hill tetrahedra'
                : s === 20
                  ? '= 10 local prolate 1×2×3 blocks + 10 oblate rhombohedra'
                  : s === 19
                    ? '= 60 axis-aligned prolate prisms + 10 oblate rhombohedra'
                    : s === 18
                      ? '= 60 prolate rectangular prisms + 10 oblate rhombohedra'
                      : s === 17
                        ? '= 60 prolate parallelogram prisms + 10 oblate rhombohedra'
                        : s === 16
                          ? '= 60 prolate triangular prisms + 10 oblate rhombohedra'
                          : s === 15
                            ? '= 60 prolate Hill tetrahedra + 10 oblate rhombohedra'
                            : '= 10 prolate + 10 oblate rhombohedra';
    if (!usePrismLabels) {
      labelEls[1].innerHTML =
        '<div class="name">Rhombic Hexecontahedron</div>' +
        '<div class="faces">60 rhombic faces</div>' +
        `<div class="role">${hexRole}</div>`;
      labelEls[2].innerHTML =
        '<div class="name">Rhombic Triacontahedron</div>' +
        '<div class="faces">30 rhombic faces</div>' +
        `<div class="role">${rtRole}</div>`;
    }
  } else {
    labelEls[1].style.display = '';
    labelEls[2].style.display = '';
    labelEls[1].innerHTML =
      '<div class="name">Icosidodecahedron</div>' +
      '<div class="faces">20 \u25b3  + 12 \u2b20  faces</div>' +
      '<div class="role">\u2190 receives P3A \u00b7 donates P5 \u2192</div>';
    labelEls[2].innerHTML =
      '<div class="name">Dodecahedron</div>' +
      '<div class="faces">12 \u2b20  faces</div>' +
      '<div class="role">\u2190 receives 12 \u00d7 P5</div>';
  }
}

// ---------------------------------------------------------------------------
// Render loop
// ---------------------------------------------------------------------------

const _q0 = new THREE.Quaternion(); // identity, reused
const _xAxis = new THREE.Vector3(1, 0, 0);
const _zAxis = new THREE.Vector3(0, 0, 1);

function render() {
  requestAnimationFrame(render);

  if (animDir !== 0) {
    const speed = STEPS[animDir > 0 ? step : step - 1].speed;
    animT = Math.min(1, animT + speed);
    if (animT >= 1) {
      step += animDir;
      animT = 0;
      animDir = 0;
      onStepChange(step);
    }
  } else if (autoplay) {
    if (step < STEPS.length - 1) beginStepAnimation(1);
    else autoplay = false;
  }

  const from = animDir < 0 ? step - 1 : step;
  const t    = animDir < 0 ? 1 - easeInOut(animT) : easeInOut(animT);
  applyVisuals(from, animDir !== 0 ? t : 0);

  const lbl = STEPS[step];
  const controlsIdle = animDir === 0 && !autoplay;
  btnBack.style.visibility = (lbl.back && controlsIdle) ? 'visible' : 'hidden';
  btnNext.style.visibility = (lbl.next && controlsIdle) ? 'visible' : 'hidden';
  btnPlayAll.textContent = autoplay ? 'Stop Playback' : 'Play All';
  if (animDir === 0) {
    if (lbl.back) btnBack.textContent = lbl.back;
    if (lbl.next) btnNext.textContent = lbl.next;
  }
  refreshStageMenu();

  controls.update();
  renderer.render(scene, camera);
  updateLabels();
}
render();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
